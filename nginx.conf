# nginx.conf
upstream django {
    server app:8000;  # Имя сервиса в docker-compose
}

server {
    listen 80;
    server_name 45.155.204.67;  # Ваш IP или домен

    location /static/ {
        alias /app/staticfiles/;  # Путь, куда collectstatic собрал файлы
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}